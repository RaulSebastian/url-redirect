services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    container_name: url-redirect-azurite
    restart: unless-stopped
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    command: >
      azurite
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --tableHost 0.0.0.0
      --location /data
    volumes:
      - ./.azurite:/data
