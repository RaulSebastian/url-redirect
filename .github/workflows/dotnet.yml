name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SOLUTION_PATH: src/UrlRedirect.sln

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore $SOLUTION_PATH
    - name: Build
      run: dotnet build $SOLUTION_PATH --configuration Release --no-restore
    - name: Detect test projects
      id: test-projects
      run: |
        if find src -name '*Tests.csproj' -o -name '*.Tests.csproj' | grep -q .; then
          echo "has_tests=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_tests=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Test
      if: steps.test-projects.outputs.has_tests == 'true'
      run: dotnet test $SOLUTION_PATH --configuration Release --no-build --verbosity normal
